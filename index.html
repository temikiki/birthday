<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthday, Tunmise 🎀</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  
<body>

    <div class="cursor" id="cursor"></div>
    <div class="cursor-ring" id="cursorRing"></div>
    <audio id="bgMusic" loop preload="auto">
      <source src="counting-my-blessings.mp3" type="audio/mpeg" />
    </audio> 
     <button
      class="music-btn"
      id="musicBtn"
      onclick="toggleMusic()"
      title="Toggle music"
    >
      🔇
    </button>
    <div class="progress-bar" id="progressBar"></div> 

        <div class="screen active fade-in" id="screen-0">
      <div
        style="position: relative; z-index: 2; text-align: center; width: 100%"
      >
        <p class="opening-eyebrow">
          Ring Ring, To the absolute Love of my life, no kidding, happy
          birthday!!
        </p>
        <h1 class="opening-title">Tunmise <em>Omotoro</em></h1>
        <p class="opening-sub">Before I start, let's dance first😂.</p>
        <!-- <div class="video-wrapper" style="position: relative">
          <div class="yt-cover" style="position:absolute;inset:0;width:100%;height:100%;overflow:hidden;">
            <div class="yt-opening" id="openingVideo" data-video-id="twNz6dXqcKA"></div>
            <button id="btn_openingVideo" onclick="togglePlay_openingVideo()" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;background:rgba(194,24,91,0.85);border:none;border-radius:50%;width:72px;height:72px;font-size:1.8rem;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity 0.3s;">▶</button>
          </div>
        </div> -->
        <div style="opacity: 0; animation: fadeIn 1s ease 2s forwards">
          <p
            style="
              font-family: &quot;Cormorant Garamond&quot;, serif;
              font-style: italic;
              font-size: 1rem;
              color: rgba(255, 255, 255, 0.4);
              margin-bottom: 24px;
            "
          >
            Oya everywhere good.
            <span style="color: var(--pink-soft)">Now, shall we?</span>
          </p>
          <button
            class="btn btn-primary"
            onclick="window.location.href='prologue.html'"
          >
            Let's continue, click me 🌸
          </button>
        </div>
      </div>
    </div>

    <script>
      // ── NAVIGATION ───────────────────────────────────────────────────────
      function goToScreen(screenId) {
        const map = {
          'screen-0':'index.html','screen-prologue':'prologue.html',
          'screen-2021':'2021.html','screen-2022':'2022.html','screen-2023':'2023.html',
          'screen-2024':'2024.html','screen-2025':'2025.html','screen-who':'who.html',
          'screen-slideshow':'slideshow.html','screen-fame':'fame.html',
          'screen-tommy':'tommy.html','screen-bisola':'bisola.html',
          'screen-messages':'sammy.html','screen-letter':'letter.html','screen-end':'end.html',
        };
        if (map[screenId]) window.location.href = map[screenId];
      }

      // ── BACKGROUND MUSIC ─────────────────────────────────────────────────
      const audio = document.getElementById('bgMusic');
      const musicBtn = document.getElementById('musicBtn');
      let musicPlaying = false, userMutedMusic = false;
      function setupGain() {
        if (window._audioCtx || !audio) return;
        try {
          window._audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const src = window._audioCtx.createMediaElementSource(audio);
          window._gainNode = window._audioCtx.createGain();
          window._gainNode.gain.value = 0.07;
          src.connect(window._gainNode); window._gainNode.connect(window._audioCtx.destination);
        } catch(e) {}
      }
      function startMusic() {
        if (userMutedMusic || musicPlaying || !audio) return;
        setupGain();
        if (window._audioCtx && window._audioCtx.state === 'suspended') window._audioCtx.resume();
        audio.volume = 1;
        audio.play().then(() => {
          musicPlaying = true;
          if (window._gainNode) window._gainNode.gain.value = 0.07;
          if (musicBtn) { musicBtn.textContent = '🎵'; musicBtn.classList.add('playing'); }
        }).catch(() => {});
      }
      function toggleMusic() {
        if (musicPlaying) {
          audio.pause(); musicPlaying = false; userMutedMusic = true;
          if (musicBtn) { musicBtn.textContent = '🔇'; musicBtn.classList.remove('playing'); }
        } else { userMutedMusic = false; startMusic(); }
      }
      document.addEventListener('click',      () => { if (!userMutedMusic) startMusic(); });
      document.addEventListener('touchstart', () => { if (!userMutedMusic) startMusic(); }, { passive: true });

      // ── CURSOR & PETALS ──────────────────────────────────────────────────
      const cursor = document.getElementById('cursor');
      const ring = document.getElementById('cursorRing');
      if (cursor && ring) {
        let mx=0,my=0,rx=0,ry=0;
        document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; cursor.style.left=mx-6+'px'; cursor.style.top=my-6+'px'; });
        (function loop(){ rx+=(mx-rx-18)*0.12; ry+=(my-ry-18)*0.12; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(loop); })();
      }
      function createPetal() {
        const p = document.createElement('div'); p.className = 'petal';
        p.style.left = Math.random()*100+'vw';
        const dur=6+Math.random()*8, delay=Math.random()*5;
        p.style.animation = `petalFall ${dur}s ${delay}s linear infinite`;
        document.body.appendChild(p); setTimeout(() => p.remove(), (dur+delay)*1000+1000);
      }
      setInterval(createPetal, 2000);

      // ── YOUTUBE ──────────────────────────────────────────────────────────
      const ytPlayers = {};
      let _playing = false;

      function onYouTubeIframeAPIReady() {
        ytPlayers['openingVideo'] = new YT.Player('openingVideo', {
          videoId: 'twNz6dXqcKA',
          playerVars: {
            autoplay: 0,
            mute: 0,
            controls: 0,
            disablekb: 1,
            fs: 0,
            iv_load_policy: 3,
            modestbranding: 1,
            playsinline: 1,
            rel: 0,
            showinfo: 0,
            enablejsapi: 1,
            origin: (window.location.origin && window.location.origin !== 'null')
              ? window.location.origin : 'https://www.youtube.com',
          },
          events: {
            onReady: (e) => {
              const iframe = e.target.getIframe();
              if (iframe) {
                iframe.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;border:none;transform:scale(1.01);transform-origin:center center;';
              }
            },
            onStateChange: (e) => {
              if (e.data === YT.PlayerState.ENDED) {
                try { e.target.seekTo(0); } catch(ex) {}
                _playing = false;
                const btn = document.getElementById('btn_openingVideo');
                if (btn) btn.style.opacity = '1';
              }
            },
          },
        });
      }

      // Click-to-play toggle
      function togglePlay_openingVideo() {
        const p = ytPlayers['openingVideo'];
        if (!p) return;
        const btn = document.getElementById('btn_openingVideo');
        if (!_playing) {
          try { p.unMute(); p.setVolume(100); p.playVideo(); } catch(e) {}
          _playing = true;
          if (btn) btn.style.opacity = '0';
        } else {
          try { p.pauseVideo(); } catch(e) {}
          _playing = false;
          if (btn) btn.style.opacity = '1';
        }
      }
    </script>
    <script src="https://www.youtube.com/iframe_api"></script>
  </body>
</html>
